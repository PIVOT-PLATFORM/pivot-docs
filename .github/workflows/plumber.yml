name: Plumber

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  plumber:
    name: Plumber CI/CD Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Plumber
        uses: getplumber/plumber@a0658c7fbd82163d75803cce492d18e50ef71afd # v1
        with:
          sarif: plumber-results.sarif
          output: plumber-results.json
          pbom-cyclonedx: plumber-pbom.cdx.json
          upload-sarif: false
          upload-artifacts: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('plumber-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: plumber-results.sarif
          category: plumber

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && hashFiles('plumber-results.json') != ''
        with:
          name: plumber-compliance
          path: |
            plumber-results.json
            plumber-results.sarif
            plumber-pbom.cdx.json
          retention-days: 30

name: Docs Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: read-all

jobs:
  lint-and-build:
    name: Lint + build docs site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint markdown (structure)
        run: npm run lint:md

      - name: Lint spelling (FR + termes techniques)
        run: npm run lint:spelling

      - name: Lint nomenclature backlog/ADR
        run: npm run lint:naming

      - name: Build (échoue sur lien cassé — onBrokenLinks: throw)
        run: npm run build

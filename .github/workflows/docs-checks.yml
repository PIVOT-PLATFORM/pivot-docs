name: Docs Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: read-all

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint-and-build:
    name: Lint + build docs site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate PNG diagrams from PlantUML sources
        run: |
          wget -q "https://github.com/plantuml/plantuml/releases/download/v1.2024.8/plantuml-1.2024.8.jar" -O /tmp/plantuml.jar
          find docs -name "*.puml" | while IFS= read -r f; do
            echo "→ Generating: $f"
            java -jar /tmp/plantuml.jar -tpng "$f" && echo "  ✓ ${f%.puml}.png" || echo "  ✗ FAILED: $f"
          done
          echo "=== Generated PNGs ===" && find docs -name "*.png" || true

      - name: Lint markdown (structure)
        run: npm run lint:md

      - name: Lint spelling (FR + termes techniques)
        run: npm run lint:spelling

      - name: Lint nomenclature backlog/ADR
        run: npm run lint:naming

      - name: "Build (échoue sur lien cassé — onBrokenLinks: throw)"
        run: npm run build
        env:
          # Injecte le bandeau d'avertissement "preview" uniquement pour une PR.
          # Sur push main, DOCS_PREVIEW_PR est vide → build de production normal.
          DOCS_PREVIEW_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}

      - name: Setup Pages
        if: github.event_name == 'pull_request'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build

  preview-deploy:
    name: Déployer l'aperçu PR sur GitHub Pages
    needs: lint-and-build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    # Le lien de preview apparaît nativement dans l'onglet "Environments" de la
    # PR (grâce à `environment:` ci-dessous) — pas besoin de token issues:write
    # supplémentaire pour poster un commentaire.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy preview to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
